name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.8.0"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/dev

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: terraform/environments/dev

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform/environments/dev

      - name: Build Docker image
        run: docker build -t hello-platform:${{ github.sha }} app/

      - name: Scan image with Trivy before pushing
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: hello-platform:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Push Docker image to ECR
        run: |
          ECR_URL=$(terraform -chdir=terraform/environments/dev output -raw ecr_repository_url)
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin "$ECR_URL"
          docker tag hello-platform:${{ github.sha }} "$ECR_URL:${{ github.sha }}"
          docker push "$ECR_URL:${{ github.sha }}"

      - name: Deploy to EKS
        run: |
          CLUSTER=$(terraform -chdir=terraform/environments/dev output -raw eks_cluster_name)
          ECR_URL=$(terraform -chdir=terraform/environments/dev output -raw ecr_repository_url)
          APP_ROLE=$(terraform -chdir=terraform/environments/dev output -raw app_role_arn)

          aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"

          # Patch placeholders with real values; use SHA tag (not latest) for reproducibility
          sed -i "s|<ECR_REPOSITORY_URL>|${ECR_URL}|g"              k8s/deployment.yaml
          sed -i "s|<IMAGE_TAG>|${{ github.sha }}|g"                k8s/deployment.yaml
          sed -i "s|<APP_ROLE_ARN>|${APP_ROLE}|g"                   k8s/serviceaccount.yaml

          kubectl apply -f k8s/
          kubectl rollout status deployment/hello-platform \
            -n hello-platform --timeout=120s
