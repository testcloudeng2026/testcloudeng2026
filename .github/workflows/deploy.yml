name: Deploy

on:
  push:
    branches: [main, develop]

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.8.0"

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    name: Deploy to Dev
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c  # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/dev

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: terraform/environments/dev

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform/environments/dev

      - name: Build Docker image
        run: docker build -t hello-platform:${{ github.sha }} app/

      - name: Scan image with Trivy before pushing
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          image-ref: hello-platform:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Push Docker image to ECR
        run: |
          ECR_URL=$(terraform -chdir=terraform/environments/dev output -raw ecr_repository_url)
          aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin "$ECR_URL"
          docker tag hello-platform:${{ github.sha }} "$ECR_URL:${{ github.sha }}"
          docker push "$ECR_URL:${{ github.sha }}"

      - name: Setup ingress controllers
        run: |
          LBC_ROLE=$(terraform -chdir=terraform/environments/dev output -raw lbc_role_arn)
          CLUSTER=$(terraform -chdir=terraform/environments/dev output -raw eks_cluster_name)
          VPC_ID=$(terraform -chdir=terraform/environments/dev output -raw vpc_id)
          aws eks update-kubeconfig --name "$CLUSTER" --region us-east-1

          # Clean up legacy ingress-nginx if still present in the cluster
          helm uninstall ingress-nginx --namespace ingress-nginx 2>/dev/null || true
          kubectl delete namespace ingress-nginx --ignore-not-found=true
          kubectl delete validatingwebhookconfiguration ingress-nginx-admission 2>/dev/null || true

          # Delete stale LBC webhooks so LBC regenerates a fresh TLS cert on upgrade
          kubectl delete validatingwebhookconfiguration aws-load-balancer-webhook 2>/dev/null || true
          kubectl delete mutatingwebhookconfiguration aws-load-balancer-webhook 2>/dev/null || true

          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName="$CLUSTER" \
            --set region="us-east-1" \
            --set vpcId="$VPC_ID" \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn"="$LBC_ROLE" \
            --set enableWebhook=false \
            --wait --timeout=5m

          # Ensure no stale webhook configs block kubectl apply
          kubectl delete validatingwebhookconfiguration aws-load-balancer-webhook 2>/dev/null || true
          kubectl delete mutatingwebhookconfiguration aws-load-balancer-webhook 2>/dev/null || true

      - name: Deploy to EKS
        run: |
          CLUSTER=$(terraform -chdir=terraform/environments/dev output -raw eks_cluster_name)
          ECR_URL=$(terraform -chdir=terraform/environments/dev output -raw ecr_repository_url)
          APP_ROLE=$(terraform -chdir=terraform/environments/dev output -raw app_role_arn)
          WAF_ARN=$(terraform -chdir=terraform/environments/dev output -raw waf_web_acl_arn)
          CERT_ARN=$(terraform -chdir=terraform/environments/dev output -raw acm_certificate_arn)
          echo "CLUSTER=$CLUSTER" >> $GITHUB_ENV
          aws eks update-kubeconfig --name "$CLUSTER" --region us-east-1

          sed -i "s|<ECR_REPOSITORY_URL>|${ECR_URL}|g"   k8s/deployment.yaml
          sed -i "s|<IMAGE_TAG>|${{ github.sha }}|g"      k8s/deployment.yaml
          sed -i "s|<APP_ROLE_ARN>|${APP_ROLE}|g"         k8s/serviceaccount.yaml
          sed -i "s|<WAF_WEB_ACL_ARN>|${WAF_ARN}|g"       k8s/ingress.yaml
          sed -i "s|<ACM_CERT_ARN>|${CERT_ARN}|g"         k8s/ingress.yaml
          sed -i "s|<ENVIRONMENT>|dev|g"                   k8s/configmap.yaml

          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/
          kubectl rollout status deployment/hello-platform \
            -n hello-platform --timeout=300s

      - name: Open NodePort on node security group
        run: |
          NODE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:kubernetes.io/cluster/${CLUSTER},Values=owned" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          NODE_SG=$(aws ec2 describe-instances --instance-ids "$NODE_ID" \
            --query 'Reservations[0].Instances[0].SecurityGroups[0].GroupId' --output text)
          echo "Node: $NODE_ID  SG: $NODE_SG"

          aws ec2 authorize-security-group-ingress --group-id "$NODE_SG" \
            --ip-permissions "IpProtocol=tcp,FromPort=30000,ToPort=32767,IpRanges=[{CidrIp=10.0.0.0/21,Description=ALB-to-NodePort}]" \
            2>/dev/null || echo "NodePort rule already exists"

      - name: Verify app health
        run: |
          ALB_DNS=$(kubectl get ingress hello-platform -n hello-platform \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
          if [ -z "$ALB_DNS" ]; then
            ALB_DNS=$(aws elbv2 describe-load-balancers \
              --query "LoadBalancers[?contains(LoadBalancerName,'hellopla')].DNSName | [0]" \
              --output text)
          fi
          echo "ALB_DNS=$ALB_DNS" >> $GITHUB_ENV

          STATUS="000"
          for i in $(seq 1 18); do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://${ALB_DNS}/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "App is healthy (HTTPS 200)"
              break
            fi
            echo "Attempt $i/18 - status: $STATUS, waiting 10s..."
            sleep 10
          done

          if [ "$STATUS" != "200" ]; then
            echo "ERROR: App did not become healthy after 3 minutes"
            exit 1
          fi

      - name: Print endpoints
        run: |
          echo "================================"
          echo "App is LIVE with WAF + HTTPS"
          echo "HTTPS: https://$ALB_DNS  (self-signed cert - browser will show a warning)"
          echo "HTTP:  http://$ALB_DNS   (redirects to HTTPS)"
          echo "================================"

  deploy-prod:
    name: Deploy to Prod
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c  # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/prod

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: terraform/environments/prod

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform/environments/prod

      - name: Build Docker image
        run: docker build -t hello-platform:${{ github.sha }} app/

      - name: Scan image with Trivy before pushing
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          image-ref: hello-platform:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Push Docker image to ECR
        run: |
          ECR_URL=$(terraform -chdir=terraform/environments/prod output -raw ecr_repository_url)
          aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin "$ECR_URL"
          docker tag hello-platform:${{ github.sha }} "$ECR_URL:${{ github.sha }}"
          docker push "$ECR_URL:${{ github.sha }}"

      - name: Install AWS Load Balancer Controller
        run: |
          LBC_ROLE=$(terraform -chdir=terraform/environments/prod output -raw lbc_role_arn)
          CLUSTER=$(terraform -chdir=terraform/environments/prod output -raw eks_cluster_name)
          VPC_ID=$(terraform -chdir=terraform/environments/prod output -raw vpc_id)
          aws eks update-kubeconfig --name "$CLUSTER" --region us-east-1

          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName="$CLUSTER" \
            --set region="us-east-1" \
            --set vpcId="$VPC_ID" \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn"="$LBC_ROLE" \
            --set enableWebhook=false \
            --wait --timeout=5m

          # Ensure no stale webhook configs block kubectl apply
          kubectl delete validatingwebhookconfiguration aws-load-balancer-webhook 2>/dev/null || true
          kubectl delete mutatingwebhookconfiguration aws-load-balancer-webhook 2>/dev/null || true

      - name: Deploy to EKS
        run: |
          CLUSTER=$(terraform -chdir=terraform/environments/prod output -raw eks_cluster_name)
          ECR_URL=$(terraform -chdir=terraform/environments/prod output -raw ecr_repository_url)
          APP_ROLE=$(terraform -chdir=terraform/environments/prod output -raw app_role_arn)
          WAF_ARN=$(terraform -chdir=terraform/environments/prod output -raw waf_web_acl_arn)
          CERT_ARN=$(terraform -chdir=terraform/environments/prod output -raw acm_certificate_arn)
          echo "CLUSTER=$CLUSTER" >> $GITHUB_ENV
          aws eks update-kubeconfig --name "$CLUSTER" --region us-east-1

          sed -i "s|<ECR_REPOSITORY_URL>|${ECR_URL}|g"   k8s/deployment.yaml
          sed -i "s|<IMAGE_TAG>|${{ github.sha }}|g"      k8s/deployment.yaml
          sed -i "s|<APP_ROLE_ARN>|${APP_ROLE}|g"         k8s/serviceaccount.yaml
          sed -i "s|<WAF_WEB_ACL_ARN>|${WAF_ARN}|g"       k8s/ingress.yaml
          sed -i "s|<ACM_CERT_ARN>|${CERT_ARN}|g"         k8s/ingress.yaml
          sed -i "s|<ENVIRONMENT>|prod|g"                  k8s/configmap.yaml

          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/
          kubectl rollout status deployment/hello-platform \
            -n hello-platform --timeout=300s

      - name: Open NodePort on node security group
        run: |
          NODE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:kubernetes.io/cluster/${CLUSTER},Values=owned" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          NODE_SG=$(aws ec2 describe-instances --instance-ids "$NODE_ID" \
            --query 'Reservations[0].Instances[0].SecurityGroups[0].GroupId' --output text)
          echo "Node: $NODE_ID  SG: $NODE_SG"

          aws ec2 authorize-security-group-ingress --group-id "$NODE_SG" \
            --ip-permissions "IpProtocol=tcp,FromPort=30000,ToPort=32767,IpRanges=[{CidrIp=10.0.0.0/21,Description=ALB-to-NodePort}]" \
            2>/dev/null || echo "NodePort rule already exists"

      - name: Verify app health
        run: |
          ALB_DNS=$(kubectl get ingress hello-platform -n hello-platform \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
          if [ -z "$ALB_DNS" ]; then
            ALB_DNS=$(aws elbv2 describe-load-balancers \
              --query "LoadBalancers[?contains(LoadBalancerName,'hellopla')].DNSName | [0]" \
              --output text)
          fi
          echo "ALB_DNS=$ALB_DNS" >> $GITHUB_ENV

          STATUS="000"
          for i in $(seq 1 18); do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://${ALB_DNS}/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "App is healthy (HTTPS 200)"
              break
            fi
            echo "Attempt $i/18 - status: $STATUS, waiting 10s..."
            sleep 10
          done

          if [ "$STATUS" != "200" ]; then
            echo "ERROR: App did not become healthy after 3 minutes"
            exit 1
          fi

      - name: Print endpoints
        run: |
          echo "================================"
          echo "App is LIVE with WAF + HTTPS"
          echo "HTTPS: https://$ALB_DNS  (self-signed cert - browser will show a warning)"
          echo "HTTP:  http://$ALB_DNS   (redirects to HTTPS)"
          echo "================================"

