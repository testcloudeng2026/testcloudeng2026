name: Deploy

on:
  push:
    branches: [main, develop]

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.8.0"

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    name: Deploy to Dev
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/dev

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: terraform/environments/dev

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform/environments/dev

      - name: Build Docker image
        run: docker build -t hello-platform:${{ github.sha }} app/

      - name: Scan image with Trivy before pushing
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: hello-platform:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Push Docker image to ECR
        run: |
          ECR_URL=$(terraform -chdir=terraform/environments/dev output -raw ecr_repository_url)
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin "$ECR_URL"
          docker tag hello-platform:${{ github.sha }} "$ECR_URL:${{ github.sha }}"
          docker push "$ECR_URL:${{ github.sha }}"

      - name: Setup ingress controllers
        run: |
          LBC_ROLE=$(terraform -chdir=terraform/environments/dev output -raw lbc_role_arn)
          CLUSTER=$(terraform -chdir=terraform/environments/dev output -raw eks_cluster_name)
          VPC_ID=$(terraform -chdir=terraform/environments/dev output -raw vpc_id)
          aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"

          # Remove NGINX (replaced by ALB)
          helm uninstall ingress-nginx --namespace ingress-nginx 2>/dev/null || true
          kubectl delete namespace ingress-nginx --ignore-not-found=true
          kubectl delete validatingwebhookconfiguration ingress-nginx-admission 2>/dev/null || true

          # Delete stale LBC webhooks so LBC regenerates a fresh TLS cert on upgrade
          kubectl delete validatingwebhookconfiguration aws-load-balancer-webhook 2>/dev/null || true
          kubectl delete mutatingwebhookconfiguration aws-load-balancer-webhook 2>/dev/null || true

          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName="$CLUSTER" \
            --set region="$AWS_REGION" \
            --set vpcId="$VPC_ID" \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn"="$LBC_ROLE" \
            --set enableWebhook=false \
            --wait --timeout=5m

          # Ensure no stale webhook configs block kubectl apply
          kubectl delete validatingwebhookconfiguration aws-load-balancer-webhook 2>/dev/null || true
          kubectl delete mutatingwebhookconfiguration aws-load-balancer-webhook 2>/dev/null || true

      - name: Deploy to EKS
        run: |
          CLUSTER=$(terraform -chdir=terraform/environments/dev output -raw eks_cluster_name)
          ECR_URL=$(terraform -chdir=terraform/environments/dev output -raw ecr_repository_url)
          APP_ROLE=$(terraform -chdir=terraform/environments/dev output -raw app_role_arn)
          WAF_ARN=$(terraform -chdir=terraform/environments/dev output -raw waf_web_acl_arn)

          aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"

          sed -i "s|<ECR_REPOSITORY_URL>|${ECR_URL}|g"  k8s/deployment.yaml
          sed -i "s|<IMAGE_TAG>|${{ github.sha }}|g"     k8s/deployment.yaml
          sed -i "s|<APP_ROLE_ARN>|${APP_ROLE}|g"        k8s/serviceaccount.yaml
          sed -i "s|<WAF_WEB_ACL_ARN>|${WAF_ARN}|g"      k8s/ingress.yaml

          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/
          kubectl rollout status deployment/hello-platform \
            -n hello-platform --timeout=300s

      - name: Register node in ALB and verify health
        run: |
          CLUSTER=$(terraform -chdir=terraform/environments/dev output -raw eks_cluster_name)
          aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"

          # 1. Get node instance ID and security group
          NODE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:kubernetes.io/cluster/${CLUSTER},Values=owned" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          NODE_SG=$(aws ec2 describe-instances --instance-ids "$NODE_ID" \
            --query 'Reservations[0].Instances[0].SecurityGroups[0].GroupId' --output text)
          echo "Node: $NODE_ID  SG: $NODE_SG"

          # 2. Open NodePort range from VPC CIDR (idempotent)
          aws ec2 authorize-security-group-ingress --group-id "$NODE_SG" \
            --ip-permissions "IpProtocol=tcp,FromPort=30000,ToPort=32767,IpRanges=[{CidrIp=10.0.0.0/21,Description=ALB-to-NodePort}]" \
            2>/dev/null || echo "NodePort rule already exists"

          # 3. Get NodePort and instance-type target group
          NODE_PORT=$(kubectl get svc hello-platform -n hello-platform \
            -o jsonpath='{.spec.ports[0].nodePort}')
          INSTANCE_TG_ARN=$(aws elbv2 describe-target-groups \
            --query "TargetGroups[?TargetType=='instance'].TargetGroupArn | [0]" --output text)
          echo "NodePort: $NODE_PORT  TG: $INSTANCE_TG_ARN"

          # 4. Get ALB and listener
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?contains(LoadBalancerName,'hellopla')].LoadBalancerArn | [0]" --output text)
          LISTENER_ARN=$(aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" \
            --query 'Listeners[0].ListenerArn' --output text)

          # 5. Ensure /* forwarding rule exists pointing to instance TG (idempotent)
          EXISTING_RULE=$(aws elbv2 describe-rules --listener-arn "$LISTENER_ARN" \
            --query "Rules[?Actions[0].Type=='forward'].RuleArn | [0]" --output text)
          if [ "$EXISTING_RULE" = "None" ] || [ -z "$EXISTING_RULE" ]; then
            aws elbv2 create-rule --listener-arn "$LISTENER_ARN" --priority 1 \
              --conditions "Field=path-pattern,Values='/*'" \
              --actions "Type=forward,TargetGroupArn=$INSTANCE_TG_ARN"
            echo "Forwarding rule created"
          else
            aws elbv2 modify-rule --rule-arn "$EXISTING_RULE" \
              --actions "Type=forward,TargetGroupArn=$INSTANCE_TG_ARN"
            echo "Forwarding rule updated"
          fi

          # 6. Register node (idempotent)
          aws elbv2 register-targets --target-group-arn "$INSTANCE_TG_ARN" \
            --targets "Id=$NODE_ID,Port=$NODE_PORT"

          # 7. Wait for healthy target
          for i in $(seq 1 18); do
            HEALTH=$(aws elbv2 describe-target-health --target-group-arn "$INSTANCE_TG_ARN" \
              --query 'TargetHealthDescriptions[0].TargetHealth.State' --output text)
            if [ "$HEALTH" = "healthy" ]; then
              echo "Target is healthy"
              break
            fi
            echo "Attempt $i/18 — state: $HEALTH, waiting 10s..."
            sleep 10
          done

          # 8. Get ALB DNS from AWS
          ALB_DNS=$(aws elbv2 describe-load-balancers --load-balancer-arns "$ALB_ARN" \
            --query 'LoadBalancers[0].DNSName' --output text)
          echo "ALB_DNS=$ALB_DNS" >> $GITHUB_ENV
          echo "ALB DNS: $ALB_DNS"

      - name: Print endpoints
        run: |
          echo "================================"
          echo "App is LIVE with WAF protection"
          echo "ALB + WAF: http://$ALB_DNS"
          echo "================================"

  deploy-prod:
    name: Deploy to Prod
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/prod

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: terraform/environments/prod

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform/environments/prod

      - name: Build Docker image
        run: docker build -t hello-platform:${{ github.sha }} app/

      - name: Scan image with Trivy before pushing
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: hello-platform:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Push Docker image to ECR
        run: |
          ECR_URL=$(terraform -chdir=terraform/environments/prod output -raw ecr_repository_url)
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin "$ECR_URL"
          docker tag hello-platform:${{ github.sha }} "$ECR_URL:${{ github.sha }}"
          docker push "$ECR_URL:${{ github.sha }}"

      - name: Install AWS Load Balancer Controller
        run: |
          LBC_ROLE=$(terraform -chdir=terraform/environments/prod output -raw lbc_role_arn)
          CLUSTER=$(terraform -chdir=terraform/environments/prod output -raw eks_cluster_name)
          VPC_ID=$(terraform -chdir=terraform/environments/prod output -raw vpc_id)
          aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"

          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName="$CLUSTER" \
            --set region="$AWS_REGION" \
            --set vpcId="$VPC_ID" \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn"="$LBC_ROLE" \
            --set enableWebhook=false \
            --wait --timeout=5m

          # Ensure no stale webhook configs block kubectl apply
          kubectl delete validatingwebhookconfiguration aws-load-balancer-webhook 2>/dev/null || true
          kubectl delete mutatingwebhookconfiguration aws-load-balancer-webhook 2>/dev/null || true

      - name: Deploy to EKS
        run: |
          CLUSTER=$(terraform -chdir=terraform/environments/prod output -raw eks_cluster_name)
          ECR_URL=$(terraform -chdir=terraform/environments/prod output -raw ecr_repository_url)
          APP_ROLE=$(terraform -chdir=terraform/environments/prod output -raw app_role_arn)
          WAF_ARN=$(terraform -chdir=terraform/environments/prod output -raw waf_web_acl_arn)

          aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"

          sed -i "s|<ECR_REPOSITORY_URL>|${ECR_URL}|g"  k8s/deployment.yaml
          sed -i "s|<IMAGE_TAG>|${{ github.sha }}|g"     k8s/deployment.yaml
          sed -i "s|<APP_ROLE_ARN>|${APP_ROLE}|g"        k8s/serviceaccount.yaml
          sed -i "s|<WAF_WEB_ACL_ARN>|${WAF_ARN}|g"      k8s/ingress.yaml

          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/
          kubectl rollout status deployment/hello-platform \
            -n hello-platform --timeout=300s

      - name: Register node in ALB and verify health
        run: |
          CLUSTER=$(terraform -chdir=terraform/environments/prod output -raw eks_cluster_name)
          aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"

          # 1. Get node instance ID and security group
          NODE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:kubernetes.io/cluster/${CLUSTER},Values=owned" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          NODE_SG=$(aws ec2 describe-instances --instance-ids "$NODE_ID" \
            --query 'Reservations[0].Instances[0].SecurityGroups[0].GroupId' --output text)
          echo "Node: $NODE_ID  SG: $NODE_SG"

          # 2. Open NodePort range from VPC CIDR (idempotent)
          aws ec2 authorize-security-group-ingress --group-id "$NODE_SG" \
            --ip-permissions "IpProtocol=tcp,FromPort=30000,ToPort=32767,IpRanges=[{CidrIp=10.0.0.0/21,Description=ALB-to-NodePort}]" \
            2>/dev/null || echo "NodePort rule already exists"

          # 3. Get NodePort and instance-type target group
          NODE_PORT=$(kubectl get svc hello-platform -n hello-platform \
            -o jsonpath='{.spec.ports[0].nodePort}')
          INSTANCE_TG_ARN=$(aws elbv2 describe-target-groups \
            --query "TargetGroups[?TargetType=='instance'].TargetGroupArn | [0]" --output text)
          echo "NodePort: $NODE_PORT  TG: $INSTANCE_TG_ARN"

          # 4. Update ALB listener to instance TG (idempotent)
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?contains(LoadBalancerName,'hellopla')].LoadBalancerArn | [0]" --output text)
          LISTENER_ARN=$(aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" \
            --query 'Listeners[0].ListenerArn' --output text)

          # 5. Ensure /* forwarding rule exists pointing to instance TG (idempotent)
          EXISTING_RULE=$(aws elbv2 describe-rules --listener-arn "$LISTENER_ARN" \
            --query "Rules[?Actions[0].Type=='forward'].RuleArn | [0]" --output text)
          if [ "$EXISTING_RULE" = "None" ] || [ -z "$EXISTING_RULE" ]; then
            aws elbv2 create-rule --listener-arn "$LISTENER_ARN" --priority 1 \
              --conditions "Field=path-pattern,Values='/*'" \
              --actions "Type=forward,TargetGroupArn=$INSTANCE_TG_ARN"
            echo "Forwarding rule created"
          else
            aws elbv2 modify-rule --rule-arn "$EXISTING_RULE" \
              --actions "Type=forward,TargetGroupArn=$INSTANCE_TG_ARN"
            echo "Forwarding rule updated"
          fi

          # 6. Register node (idempotent)
          aws elbv2 register-targets --target-group-arn "$INSTANCE_TG_ARN" \
            --targets "Id=$NODE_ID,Port=$NODE_PORT"

          # 7. Wait for healthy target
          for i in $(seq 1 18); do
            HEALTH=$(aws elbv2 describe-target-health --target-group-arn "$INSTANCE_TG_ARN" \
              --query 'TargetHealthDescriptions[0].TargetHealth.State' --output text)
            if [ "$HEALTH" = "healthy" ]; then
              echo "Target is healthy"
              break
            fi
            echo "Attempt $i/18 — state: $HEALTH, waiting 10s..."
            sleep 10
          done

          # 8. Get ALB DNS from AWS
          ALB_DNS=$(aws elbv2 describe-load-balancers --load-balancer-arns "$ALB_ARN" \
            --query 'LoadBalancers[0].DNSName' --output text)
          echo "ALB_DNS=$ALB_DNS" >> $GITHUB_ENV
          echo "ALB DNS: $ALB_DNS"

      - name: Print endpoints
        run: |
          echo "================================"
          echo "App is LIVE with WAF protection"
          echo "ALB + WAF: http://$ALB_DNS"
          echo "================================"
