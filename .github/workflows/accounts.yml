name: Manage AWS Accounts

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.8.0"

permissions:
  id-token: write
  contents: read

jobs:
  manage-accounts:
    name: "${{ github.event.inputs.action }} — AWS Accounts"
    runs-on: ubuntu-latest
    environment: management
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/management

      - name: Terraform Plan
        run: terraform plan -no-color
        working-directory: terraform/management

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve
        working-directory: terraform/management

      - name: Print account IDs
        if: github.event.inputs.action == 'apply'
        run: |
          echo "Dev Account ID:  $(terraform output -raw dev_account_id)"
          echo "Prod Account ID: $(terraform output -raw prod_account_id)"
        working-directory: terraform/management
