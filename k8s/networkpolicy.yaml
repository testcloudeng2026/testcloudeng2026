# Default deny-all: no pod can send or receive traffic unless explicitly allowed below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: hello-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow AWS Load Balancer Controller (target-type: ip) to reach pods on port 8080.
# ALB sends health checks and traffic directly to pod IPs from the VPC CIDR.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-alb
  namespace: hello-platform
spec:
  podSelector:
    matchLabels:
      app: hello-platform
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.0.0.0/21
      ports:
        - port: 8080
          protocol: TCP
---
# Allow outbound DNS and HTTPS to AWS APIs (ECR, SSM, CloudWatch via IRSA).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress
  namespace: hello-platform
spec:
  podSelector:
    matchLabels:
      app: hello-platform
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 443
          protocol: TCP
