apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-platform
  namespace: hello-platform
  annotations:
    # NGINX Ingress — cloud-agnostic; same resource works on GKE without annotation changes
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - dev.hello-platform.example.com
      secretName: hello-platform-tls
  rules:
    - host: dev.hello-platform.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hello-platform
                port:
                  number: 80
